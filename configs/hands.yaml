# Poker-hand CLI: full Roboflow dataset as test split (multi-card table photos)

data:
  yaml_path: dataset/data.yaml
  dataset_root: dataset

model:
  task: classify
  weights: yolov8n-cls.pt
  imgsz: 640

train:
  epochs: 1
  batch: 1
  patience: 1
  device: auto
  workers: 0
  project: runs/train
  name: poker_cards
  seed: 42
  lr0: 0.01
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 0

augmentations:
  enabled: false

validate:
  metric_conf: 0.001
  iou: 0.45
  split: test

infer:
  conf: 0.25
  iou: 0.45
  save_dir: runs/infer
  source: dataset/test/images

mlflow:
  tracking_uri: http://localhost:5000
  experiment_name: poker-yolo-hands
  run_name: null

reporting:
  log_dir: runs/logs
  report_dir: runs/reports
  level: INFO
  json_logs: true
  console_json: false
  reports_base_url: http://localhost:8088
  preview_samples: 0
  pushgateway_url: null
