# Smoke test config — minimal epochs for pipeline verification

data:
  yaml_path: dataset/kaggle/data.yaml
  dataset_root: dataset/kaggle

benchmark:
  yaml_path: dataset/data.yaml
  dataset_root: dataset

model:
  task: classify
  weights: yolov8n-cls.pt
  imgsz: 640

train:
  preflight_cpu_epochs: 0
  epochs: 3
  batch: 4
  patience: 3
  device: cpu
  workers: 0
  project: runs/train
  name: poker_cards_smoke
  seed: 42
  lr0: 0.01
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 1

augmentations:
  enabled: true
  mosaic: 1.0
  mixup: 0.1
  copy_paste: 0.15
  cutmix: 0.05
  fliplr: 0.5
  flipud: 0.0
  degrees: 10.0
  translate: 0.1
  scale: 0.45
  shear: 3.0
  perspective: 0.0003
  hsv_h: 0.015
  hsv_s: 0.6
  hsv_v: 0.35
  albumentations:
    blur: 0.08
    brightness_contrast: 0.3
    gauss_noise: 0.08

validate:
  metric_conf: 0.001
  iou: 0.45
  split: val

infer:
  conf: 0.35
  iou: 0.45
  save_dir: runs/infer
  source: dataset/test/images

mlflow:
  tracking_uri: http://localhost:5000
  experiment_name: poker-yolo
  run_name: smoke-test

reporting:
  log_dir: runs/logs
  report_dir: runs/reports
  level: INFO
  json_logs: true
  console_json: false
  pushgateway_url: http://localhost:9091
