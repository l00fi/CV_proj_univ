# YOLOv8 training configuration for poker card detection

data:
  yaml_path: dataset/data.yaml
  dataset_root: dataset

model:
  weights: yolov8n.pt
  imgsz: 640

train:
  epochs: 50
  batch: 8
  patience: 15
  device: auto
  workers: 4
  project: runs/train
  name: poker_cards
  seed: 42
  lr0: 0.01
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3

# On-the-fly augmentations (applied in dataloader, not pre-saved to disk)
augmentations:
  enabled: true
  # YOLO built-in: mosaic / mixup / copy-paste / cutmix
  mosaic: 1.0
  mixup: 0.2
  copy_paste: 0.35
  cutmix: 0.1
  fliplr: 0.5
  flipud: 0.0
  # Geometric
  degrees: 15.0
  translate: 0.15
  scale: 0.5
  shear: 5.0
  perspective: 0.0005
  # Color (HSV jitter)
  hsv_h: 0.02
  hsv_s: 0.7
  hsv_v: 0.4
  # Albumentations (probability of each transform group per sample)
  albumentations:
    blur: 0.15
    motion_blur: 0.1
    gauss_noise: 0.15
    brightness_contrast: 0.5
    hue_saturation: 0.25
    clahe: 0.1
    image_compression: 0.25
    coarse_dropout: 0.15
    shift_scale_rotate: 0.25
    optical_distortion: 0.05
    to_gray: 0.05

validate:
  conf: 0.25
  iou: 0.45
  split: test

infer:
  conf: 0.35
  iou: 0.45
  save_dir: runs/infer

mlflow:
  tracking_uri: http://mlflow:5000
  experiment_name: poker-yolo
  run_name: null

reporting:
  log_dir: runs/logs
  report_dir: runs/reports
  level: INFO
  json_logs: true
  console_json: false
  reports_base_url: http://localhost:8088
  preview_samples: 3
  pushgateway_url: http://localhost:9091
