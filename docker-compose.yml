services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.3
    container_name: poker-mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    restart: unless-stopped

  poker-yolo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: poker-yolo
    depends_on:
      - mlflow
    volumes:
      - ./dataset:/app/dataset:ro
      - ./runs:/app/runs
      - ./configs:/app/configs:ro
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      PROMETHEUS_PUSHGATEWAY_URL: http://pushgateway:9091
    # Uncomment for GPU (requires NVIDIA Container Toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # Optional observability stack (Grafana + Prometheus + Pushgateway):
  #   docker compose --profile observability up -d
  # Grafana:  http://localhost:3001  (admin / admin)
  # Reports:  http://localhost:8088/preview/
  # MLflow:   http://localhost:5000

  report-server:
    image: nginx:1.27-alpine
    container_name: poker-report-server
    ports:
      - "8088:8088"
    volumes:
      - ./runs/reports:/usr/share/nginx/html:ro
      - ./observability/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    profiles:
      - observability
    restart: unless-stopped

  pushgateway:
    image: prom/pushgateway:v1.9.0
    container_name: poker-pushgateway
    ports:
      - "9091:9091"
    profiles:
      - observability
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: poker-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    profiles:
      - observability
    depends_on:
      - pushgateway
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    container_name: poker-grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: dark
    profiles:
      - observability
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  mlflow_data:
  prometheus_data:
  grafana_data:
