services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.3
    container_name: poker-mlflow
    ports:
      - "${MLFLOW_PORT}:5000"
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    restart: unless-stopped

  poker-yolo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: poker-yolo
    depends_on:
      - mlflow
    env_file:
      - .env
    volumes:
      - ./dataset:/app/dataset
      - kaggle_data:/app/dataset/kaggle
      - ./runs:/app/runs
      - ./configs:/app/configs:ro
      - ${KAGGLE_CONFIG_DIR}:/root/.kaggle:ro
    environment:
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      PROMETHEUS_PUSHGATEWAY_URL: ${PROMETHEUS_PUSHGATEWAY_URL}
      REPORTS_BASE_URL: ${REPORTS_BASE_URL}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES}
      KAGGLE_USERNAME: ${KAGGLE_USERNAME}
      KAGGLE_KEY: ${KAGGLE_KEY}
      POKER_YOLO_DEVICE: ${POKER_YOLO_DEVICE}
      REQUIRE_CUDA: ${REQUIRE_CUDA}
    # NVIDIA Container Toolkit on the host (Docker Desktop: enable GPU in settings)
    gpus: all
    # PyTorch DataLoader uses /dev/shm; Docker default (64MB) is too small for YOLO + workers
    shm_size: "8gb"

  # Optional observability stack (Grafana + Prometheus + Pushgateway):
  #   docker compose --profile observability up -d
  # Grafana:  http://localhost:${GRAFANA_PORT}  (see .env)
  # Reports:  http://localhost:${REPORT_SERVER_PORT}/preview/
  # MLflow:   http://localhost:${MLFLOW_PORT}

  report-server:
    image: nginx:1.27-alpine
    container_name: poker-report-server
    ports:
      - "${REPORT_SERVER_PORT}:8088"
    volumes:
      - ./runs/reports:/usr/share/nginx/html:ro
      - ./observability/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    profiles:
      - observability
    restart: unless-stopped

  pushgateway:
    image: prom/pushgateway:v1.9.0
    container_name: poker-pushgateway
    ports:
      - "${PUSHGATEWAY_PORT}:9091"
    profiles:
      - observability
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: poker-prometheus
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    profiles:
      - observability
    depends_on:
      - pushgateway
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    container_name: poker-grafana
    ports:
      - "${GRAFANA_PORT}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_DEFAULT_THEME: ${GRAFANA_THEME}
    profiles:
      - observability
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  mlflow_data:
  prometheus_data:
  grafana_data:
  kaggle_data:
